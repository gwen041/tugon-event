<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign-Up — TUGON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../styles/login.css" />
</head>

<body>
  <nav class="navbar">
    <div class="nav-left">
      <img src="../assets/icons/icon.png" alt="Icon" class="nav-icon" />
    </div>
    <div class="nav-links-right">
      <span class="nav-login-text">SIGN-UP</span>
    </div>
  </nav>

  <main class="page-content">
    <div class="login-page">

      <!-- Left Panel: System Logo -->
      <div class="login-visual page-fade">
        <div class="hero-glow"></div>
        <img src="../assets/icons/tugon_logo.png" alt="TUGON Logo" class="login-visual-logo" style="height: 140px; margin-bottom: 2rem;" />
        <h1 style="color: white; font-family: var(--font-body); font-weight: 700; font-size: 1.8rem; margin-bottom: 1rem; position: relative; z-index: 2;">Join the Event</h1>
        <p style="color: rgba(255,255,255,0.7); font-size: 0.9rem; max-width: 320px; text-align: center; position: relative; z-index: 2;">
          Sign-up now to secure your spot and be part of an unforgettable campus experience.
        </p>
      </div>

      <!-- Right Panel: Sign-Up Form -->
      <div class="login-form-wrap">
        <div class="form-card page-fade">
          <h2>Sign-Up</h2>
          <p class="subtitle">Fill in the details below to create your account</p>

          <form id="signup-form">
            <div class="form-row">
              <div class="form-group">
                <label for="signup-fname">FIRST NAME*</label>
                <input type="text" id="signup-fname" placeholder="JUAN" required />
              </div>
              <div class="form-group">
                <label for="signup-lname">LAST NAME*</label>
                <input type="text" id="signup-lname" placeholder="DELA CRUZ" required />
              </div>
            </div>

            <div class="form-group">
              <label for="signup-email">EMAIL ADDRESS*</label>
              <input type="email" id="signup-email" placeholder="juandelacruz@gmail.com" required />
            </div>

            <div class="form-group">
              <label for="signup-password">PASSWORD*</label>
              <input type="password" id="signup-password" required />
            </div>

            <div class="form-group">
              <label for="signup-studentid">STUDENT ID*</label>
              <input type="text" id="signup-studentid" required />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="signup-college">COLLEGE*</label>
                <select id="signup-college" required>
                  <option value="">-- Select College --</option>
                  <option value="Arts and Science">Arts and Science</option>
                  <option value="Business and Accountancy">Business and Accountancy</option>
                  <option value="Computer Studies">Computer Studies</option>
                  <option value="Education">Education</option>
                  <option value="Engineering">Engineering</option>
                  <option value="Hospitality Management">Hospitality Management</option>
                  <option value="Nursing">Nursing</option>
                </select>
              </div>
              <div class="form-group">
                <label for="signup-year">YEAR LEVEL*</label>
                <select id="signup-year" required>
                  <option value="">-- Select Year --</option>
                  <option value="1st Year">1st Year</option>
                  <option value="2nd Year">2nd Year</option>
                  <option value="3rd Year">3rd Year</option>
                  <option value="4th Year">4th Year</option>
                </select>
              </div>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Sign Up →</button>
          </form>

          <div class="create-account">
            Already have an account? <a href="login.html">Login here</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer
    style="background: var(--black); color: rgba(255,255,255,0.3); padding: 2rem; text-align: center; font-size: 0.8rem; border-top: 1px solid rgba(0,122,122,0.12);">
    &copy; 2026 TUGON School Event System
  </footer>

</body>

</html>
