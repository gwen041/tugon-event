<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign-Up — TUGON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../styles/login.css" />
  <style>
    .cascade-row { display: none; }
    .cascade-row.visible { display: grid; }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-left">
      <img src="../assets/icons/icon.png" alt="Icon" class="nav-icon" />
    </div>
    <div class="nav-links-right">
      <span class="nav-login-text">SIGN-UP</span>
    </div>
  </nav>

  <main class="page-content">
    <div class="login-page">

      <!-- Left Panel -->
      <div class="login-visual page-fade">
        <div class="hero-glow"></div>
        <img src="../assets/icons/tugon_logo.png" alt="TUGON Logo" class="login-visual-logo"
          style="height:140px;margin-bottom:2rem;" />
        <h1 style="color:white;font-family:var(--font-body);font-weight:700;font-size:1.8rem;margin-bottom:1rem;position:relative;z-index:2;">Join the Event</h1>
        <p style="color:rgba(255,255,255,0.7);font-size:0.9rem;max-width:320px;text-align:center;position:relative;z-index:2;">
          Sign-up now to secure your spot and be part of an unforgettable campus experience.
        </p>
      </div>

      <!-- Right Panel -->
      <div class="login-form-wrap">
        <div class="form-card page-fade">
          <h2>Sign-Up</h2>
          <p class="subtitle">Fill in the details below to create your account</p>

          <form id="signup-form" novalidate>

            <div class="form-row">
              <div class="form-group">
                <label for="signup-fname">FIRST NAME *</label>
                <input type="text" id="signup-fname" name="first_name" placeholder="Juan" required />
              </div>
              <div class="form-group">
                <label for="signup-lname">LAST NAME *</label>
                <input type="text" id="signup-lname" name="last_name" placeholder="Dela Cruz" required />
              </div>
            </div>

            <div class="form-group">
              <label for="signup-email">EMAIL ADDRESS *</label>
              <input type="email" id="signup-email" name="email" placeholder="juandelacruz@gmail.com" required />
            </div>

            <div class="form-group">
              <label for="signup-password">PASSWORD *</label>
              <input type="password" id="signup-password" name="password" placeholder="••••••••" required />
            </div>

            <div class="form-group">
              <label for="signup-studentid">STUDENT ID *</label>
              <input type="text" id="signup-studentid" name="student_id" placeholder="e.g. 2024-00001" required inputmode="numeric" />
            </div>

            <!-- College + Year -->
            <div class="form-row">
              <div class="form-group">
                <label for="signup-college">COLLEGE *</label>
                <select id="signup-college" name="college" required>
                  <option value="">-- Select College --</option>
                  <option value="Arts and Science">Arts and Science</option>
                  <option value="Business and Accountancy">Business and Accountancy</option>
                  <option value="Computer Studies">Computer Studies</option>
                  <option value="Education">Education</option>
                  <option value="Engineering">Engineering</option>
                  <option value="Hospitality Management">Hospitality Management</option>
                  <option value="Nursing">Nursing</option>
                </select>
              </div>
              <div class="form-group">
                <label for="signup-year">YEAR LEVEL *</label>
                <select id="signup-year" name="year_level" required>
                  <option value="">-- Select Year --</option>
                  <option value="1st Year">1st Year</option>
                  <option value="2nd Year">2nd Year</option>
                  <option value="3rd Year">3rd Year</option>
                  <option value="4th Year">4th Year</option>
                </select>
              </div>
            </div>

            <!-- Course (cascades from College) -->
            <div class="form-row cascade-row" id="course-row">
              <div class="form-group" style="grid-column:1/-1;">
                <label for="signup-course">COURSE *</label>
                <select id="signup-course" name="course">
                  <option value="">-- Select Course --</option>
                </select>
              </div>
            </div>

            <!-- Major (cascades from BSEd only) -->
            <div class="form-row cascade-row" id="major-row">
              <div class="form-group" style="grid-column:1/-1;">
                <label for="signup-major">MAJOR *</label>
                <select id="signup-major" name="major">
                  <option value="">-- Select Major --</option>
                  <option value="English">English</option>
                  <option value="Filipino">Filipino</option>
                  <option value="Mathematics">Mathematics</option>
                </select>
              </div>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top:1rem;">Sign Up &rarr;</button>
          </form>

          <div class="create-account">
            Already have an account? <a href="login.html">Login here</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer style="background:var(--black);color:rgba(255,255,255,0.3);padding:2rem;text-align:center;font-size:0.8rem;border-top:1px solid rgba(0,122,122,0.12);">
    &copy; 2026 TUGON School Event System
  </footer>

  <script>
    /* ── Cascade: College → Course → Major ──────────────── */
    const COURSES = {
      'Computer Studies': ['BS in Computer Science', 'BS in Information Technology'],
      'Education':        ['Bachelor in Elementary Education (BEEd)', 'Bachelor in Secondary Education (BSEd)'],
    };

    const collegeEl = document.getElementById('signup-college');
    const courseEl  = document.getElementById('signup-course');
    const majorEl   = document.getElementById('signup-major');
    const courseRow = document.getElementById('course-row');
    const majorRow  = document.getElementById('major-row');

    collegeEl.addEventListener('change', function () {
      const opts = COURSES[this.value];
      courseEl.innerHTML = '<option value="">-- Select Course --</option>';
      courseEl.required  = false;
      majorEl.required   = false;
      courseRow.classList.remove('visible');
      majorRow.classList.remove('visible');
      if (opts) {
        opts.forEach(c => {
          const o = document.createElement('option');
          o.value = o.textContent = c;
          courseEl.appendChild(o);
        });
        courseEl.required = true;
        courseRow.classList.add('visible');
      }
    });

    courseEl.addEventListener('change', function () {
      majorEl.required = false;
      majorRow.classList.remove('visible');
      if (this.value === 'Bachelor in Secondary Education (BSEd)') {
        majorEl.required = true;
        majorRow.classList.add('visible');
      }
    });

    /* ── Student ID: only digits and hyphens ─────────────── */
    document.getElementById('signup-studentid').addEventListener('input', function () {
      this.value = this.value.replace(/[^0-9-]/g, '');
    });

    /* ── Signup form submission → real API ───────────────── */
    const signupForm = document.getElementById('signup-form');
    if (signupForm) {
      const submitBtn = signupForm.querySelector('button[type="submit"]');
      signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.textContent = 'Creating account…';
        submitBtn.disabled    = true;

        const payload = {
          first_name: document.getElementById('signup-fname').value.trim(),
          last_name:  document.getElementById('signup-lname').value.trim(),
          email:      document.getElementById('signup-email').value.trim(),
          password:   document.getElementById('signup-password').value,
          student_id: document.getElementById('signup-studentid').value.trim(),
          college:    document.getElementById('signup-college').value,
          course:     document.getElementById('signup-course').value  || null,
          major:      document.getElementById('signup-major').value   || null,
          year_level: document.getElementById('signup-year').value,
        };

        /* Front-end validations */
        if (!payload.email.toLowerCase().endsWith('@plpasig.edu.ph')) {
          alert('Email must end with @plpasig.edu.ph (e.g. juandelacruz@plpasig.edu.ph).');
          submitBtn.textContent = 'Sign Up \u2192';
          submitBtn.disabled    = false;
          return;
        }
        if (!/^[0-9-]+$/.test(payload.student_id)) {
          alert('Student ID must contain only numbers (e.g. 2024-00001).');
          submitBtn.textContent = 'Sign Up \u2192';
          submitBtn.disabled    = false;
          return;
        }

        try {
          const res  = await fetch('/api/auth/signup', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) {
            alert(data.error || 'Sign-up failed. Please try again.');
            submitBtn.textContent = 'Sign Up \u2192';
            submitBtn.disabled    = false;
            return;
          }
          alert('Account created! You can now log in.');
          window.location.href = 'login.html';
        } catch {
          alert('Could not reach the server. Please make sure it is running.');
          submitBtn.textContent = 'Sign Up \u2192';
          submitBtn.disabled    = false;
        }
      });
    }
  </script>
</body>

</html>
