<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Event — TUGON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../styles/admin_dashboard.css" />
  
  <style>
    .targeting-section {
      margin-top: 1.5rem;
      width: 100%;
      grid-column: 1 / -1;
    }
    .checkbox-grid-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    .pill-checkbox {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(15, 25, 35, 0.9);
      backdrop-filter: blur(2px);
      padding: 0.55rem 1.2rem;
      border-radius: 60px;
      border: 1px solid rgba(45, 212, 191, 0.35);
      font-size: 0.85rem;
      font-weight: 500;
      color: #eef5ff;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .pill-checkbox:hover {
      background: rgba(0, 180, 180, 0.2);
      border-color: #2dd4bf;
    }
    .pill-checkbox input {
      margin: 0;
      width: 1rem;
      height: 1rem;
      accent-color: #2dd4bf;
      cursor: pointer;
    }
    .pill-checkbox.disabled {
      opacity: 0.55;
      filter: grayscale(0.1);
      pointer-events: none;
    }
    .admin-form {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }
    .form-left,
    .form-right {
      flex: 1;
      min-width: 260px;
    }
    @media (max-width: 780px) {
      .form-left,
      .form-right {
        flex: 0 0 100%;
      }
    }
  </style>
</head>

<body>

  <!-- Mobile sidebar toggle (checkbox hack) -->
  <input type="checkbox" id="sidebar-toggle" class="sidebar-toggle">
  <label for="sidebar-toggle" class="sidebar-overlay"></label>
  <label for="sidebar-toggle" class="sidebar-hamburger" aria-label="Toggle Menu">
    <span></span><span></span><span></span>
  </label>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/icons/icon.png" alt="Icon" />
      <span>TUGON</span>
    </div>

    <ul class="nav-menu">
      <li class="nav-item">
        <a href="admin_dashboard.html" class="nav-link active">
          <span class="icon">📅</span>
          <span>Events</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="add_event.html" class="nav-link">
          <span class="icon">➕</span>
          <span>Add Event</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="registrations.html" class="nav-link">
          <span class="icon">👥</span>
          <span>Registrations</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <a href="login.html" class="nav-link">
        <span>Logout</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="header-section">
      <div class="header-text">
        <h1>Edit Event</h1>
        <p>Update the event details below. Pinning is managed from the Events dashboard.</p>
      </div>

      <div class="user-profile">
        <span>Admin Portal</span>
        <div
          style="width: 32px; height: 32px; background: var(--teal-main); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem;">
          A</div>
      </div>
    </header>

    <div class="form-container">
      <form class="admin-form" id="edit-event-form" novalidate>

        <!-- LEFT COLUMN -->
        <div class="form-left">
          <div class="form-section">
            <div class="section-header">
              <span class="icon">📝</span>
              <h2>General & Schedule</h2>
            </div>
            <div class="form-group">
              <label for="event-title">Event Title *</label>
              <input type="text" id="event-title" placeholder="e.g. Science Fair 2025" required />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="event-date">Date *</label>
                <input type="date" id="event-date" required />
              </div>
              <div class="form-group">
                <label>Time Range *</label>
                <div class="time-range">
                  <input type="time" id="start-time" required />
                  <span>to</span>
                  <input type="time" id="end-time" required />
                </div>
              </div>
            </div>
            <div class="form-group" style="margin-top: 0.5rem;">
              <label for="event-location">Venue / Location *</label>
              <select id="event-location" required>
                <option value="" disabled>Select where it will happen...</option>
                <option value="Auditorium">Auditorium</option>
                <option value="Gymnasium">Gymnasium</option>
                <option value="Facade">Facade</option>
                <option value="Multi-purpose Hall">Multi-purpose Hall</option>
                <option value="School Field">School Field</option>
              </select>
            </div>
            <div class="form-group" style="margin-top: 0.5rem;">
              <label for="event-image">Event Banner Image <span style="font-weight:400;opacity:0.7;">(optional – leave blank to keep existing)</span></label>
              <input type="file" id="event-image" name="event_image" accept="image/jpeg,image/png,image/webp,image/gif"
                style="width:100%;padding:0.5rem 0.85rem;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:#0f1923;color:rgba(255,255,255,0.8);font-size:0.9rem;cursor:pointer;" />
              <p id="current-image-note" style="font-size:0.78rem;color:rgba(255,255,255,0.4);margin:0.3rem 0 0;"></p>
            </div>

        <!-- RIGHT COLUMN -->
        <div class="form-right">
          <div class="form-section" style="height: 100%; display: flex; flex-direction: column; min-height: 480px;">
            <div class="section-header">
              <span class="icon">⚙️</span>
              <h2>Description & Logistics</h2>
            </div>

            <div class="form-group" style="flex-grow: 1; display: flex; flex-direction: column; margin-bottom: 1.5rem;">
              <label for="event-description">Description *</label>
              <textarea id="event-description" placeholder="Describe the event goals and activities..." required
                style="flex-grow: 1; min-height: 120px;"></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem;">
              <div class="form-group">
                <label for="event-category">Category *</label>
                <select id="event-category" required>
                  <option value="" disabled>Select category...</option>
                  <option value="Academic">Academic</option>
                  <option value="Sports">Sports</option>
                  <option value="Cultural">Cultural</option>
                  <option value="Social">Social</option>
                  <option value="Others">Others</option>
                </select>
              </div>
              <div class="form-group">
                <label for="event-capacity">Capacity (Max 300) *</label>
                <input type="number" id="event-capacity" min="1" max="300" placeholder="Max 300" required />
              </div>
            </div>
          </div>
        </div>

        <!-- FULL-WIDTH: TARGET AUDIENCE -->
        <div class="targeting-section">
          <div class="form-section">
            <div class="section-header">
              <span class="icon">🎯</span>
              <h2>Target Audience</h2>
            </div>

            <div class="form-group">
              <label>Target Colleges * <span style="font-weight: 400; opacity:0.75;">(check all that apply)</span></label>
              <div class="checkbox-grid-pills" id="college-pill-group">
                <label class="pill-checkbox" id="college-all-label">
                  <input type="checkbox" name="target_colleges" value="All" class="college-check" id="college-all" />
                  <span>🏛️ All Colleges</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Arts and Science" class="college-check" />
                  <span>Arts and Science</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Business and Accountancy" class="college-check" />
                  <span>Business &amp; Accountancy</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Computer Studies" class="college-check" />
                  <span>Computer Studies</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Education" class="college-check" />
                  <span>Education</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Engineering" class="college-check" />
                  <span>Engineering</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Hospitality Management" class="college-check" />
                  <span>Hospitality Management</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Nursing" class="college-check" />
                  <span>Nursing</span>
                </label>
              </div>
            </div>

            <div class="form-group" style="margin-top: 1.8rem;">
              <label>Target Year Levels * <span style="font-weight: 400; opacity:0.75;">(check all that apply)</span></label>
              <div class="checkbox-grid-pills" id="year-pill-group">
                <label class="pill-checkbox" id="year-all-label">
                  <input type="checkbox" name="target_years" value="All" class="year-check" id="year-all" />
                  <span>🌟 All Years</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_years" value="1st Year" class="year-check" />
                  <span>1st Year</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_years" value="2nd Year" class="year-check" />
                  <span>2nd Year</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_years" value="3rd Year" class="year-check" />
                  <span>3rd Year</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_years" value="4th Year" class="year-check" />
                  <span>4th Year</span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <div class="btn-publish-container">
          <a href="admin_dashboard.html" class="btn btn-dash" style="text-decoration:none;margin-right:1rem;">← Cancel</a>
          <button type="submit" class="btn btn-dash btn-publish">Save Changes →</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    (function() {
      const adminToken = localStorage.getItem('tugon_admin_token');
      if (!adminToken) { window.location.href = 'login.html'; return; }

      // Get event ID from URL
      const params  = new URLSearchParams(window.location.search);
      const eventId = params.get('id');
      if (!eventId) { alert('No event ID specified.'); window.location.href = 'admin_dashboard.html'; return; }

      /* ── Mutual exclusion logic (same as add_event) ── */
      const collegeAll           = document.getElementById('college-all');
      const allCollegeChecks     = document.querySelectorAll('.college-check');
      const specificCollegeChecks = Array.from(allCollegeChecks).filter(cb => cb.value !== 'All');
      const yearAll              = document.getElementById('year-all');
      const allYearChecks        = document.querySelectorAll('.year-check');
      const specificYearChecks   = Array.from(allYearChecks).filter(cb => cb.value !== 'All');

      function updateCollegePillState() {
        if (collegeAll.checked) {
          specificCollegeChecks.forEach(cb => {
            cb.checked = false;
            const p = cb.closest('.pill-checkbox');
            if (p) p.classList.add('disabled');
          });
        } else {
          specificCollegeChecks.forEach(cb => {
            const p = cb.closest('.pill-checkbox');
            if (p) p.classList.remove('disabled');
          });
        }
      }

      function updateYearPillState() {
        if (yearAll.checked) {
          specificYearChecks.forEach(cb => {
            cb.checked = false;
            const p = cb.closest('.pill-checkbox');
            if (p) p.classList.add('disabled');
          });
        } else {
          specificYearChecks.forEach(cb => {
            const p = cb.closest('.pill-checkbox');
            if (p) p.classList.remove('disabled');
          });
        }
      }

      collegeAll.addEventListener('change', () => {
        if (collegeAll.checked) specificCollegeChecks.forEach(cb => cb.checked = false);
        updateCollegePillState();
      });
      specificCollegeChecks.forEach(cb => cb.addEventListener('change', () => {
        if (cb.checked) collegeAll.checked = false;
        updateCollegePillState();
      }));
      yearAll.addEventListener('change', () => {
        if (yearAll.checked) specificYearChecks.forEach(cb => cb.checked = false);
        updateYearPillState();
      });
      specificYearChecks.forEach(cb => cb.addEventListener('change', () => {
        if (cb.checked) yearAll.checked = false;
        updateYearPillState();
      }));

      /* ── Helpers ─────────────────────────────────────── */
      function getSelectedColleges() {
        const checked = Array.from(allCollegeChecks).filter(cb => cb.checked).map(cb => cb.value);
        return checked.includes('All') ? ['All'] : checked;
      }
      function getSelectedYears() {
        const checked = Array.from(allYearChecks).filter(cb => cb.checked).map(cb => cb.value);
        return checked.includes('All') ? ['All'] : checked;
      }

      function showInlineError(message) {
        let errDiv = document.getElementById('dynamic-form-error');
        if (!errDiv) {
          errDiv = document.createElement('div');
          errDiv.id = 'dynamic-form-error';
          errDiv.style.cssText = 'margin:0 0 1rem 0;padding:0.8rem 1.2rem;border-radius:12px;background:rgba(220,38,38,0.15);border:1px solid rgba(239,68,68,0.4);color:#fca5a5;font-weight:500;';
          const fc = document.querySelector('.admin-form');
          if (fc) fc.prepend(errDiv);
        }
        errDiv.textContent = message;
        errDiv.style.display = 'block';
        setTimeout(() => errDiv.scrollIntoView({ behavior:'smooth', block:'center' }), 50);
      }
      function clearInlineError() {
        const e = document.getElementById('dynamic-form-error');
        if (e) e.style.display = 'none';
      }

      /* ── Load existing event data ─────────────────────── */
      async function loadEvent() {
        try {
          const res  = await fetch(`/api/admin/events/${eventId}`, {
            headers: { 'Authorization': 'Bearer ' + adminToken },
          });
          const data = await res.json();
          if (!res.ok) { alert(data.error || 'Failed to load event.'); window.location.href = 'admin_dashboard.html'; return; }

          // Populate fields
          document.getElementById('event-title').value       = data.title || '';
          document.getElementById('event-date').value        = data.date ? data.date.split('T')[0] : '';
          document.getElementById('start-time').value        = data.start_time ? data.start_time.slice(0,5) : '';
          document.getElementById('end-time').value          = data.end_time   ? data.end_time.slice(0,5)   : '';
          document.getElementById('event-description').value = data.description || '';
          document.getElementById('event-capacity').value    = data.capacity || '';

          // Show current image note if one exists
          const imgNote = document.getElementById('current-image-note');
          if (imgNote && data.image_url) {
            imgNote.textContent = '✅ Current image: ' + data.image_url.split('/').pop();
          }

          // Location select
          const locSel = document.getElementById('event-location');
          if (data.location) {
            for (const opt of locSel.options) {
              if (opt.value === data.location) { opt.selected = true; break; }
            }
          }

          // Category select
          const catSel = document.getElementById('event-category');
          if (data.category) {
            for (const opt of catSel.options) {
              if (opt.value === data.category) { opt.selected = true; break; }
            }
          }

          // Colleges
          const colleges = Array.isArray(data.target_colleges) ? data.target_colleges : [];
          if (colleges.includes('All')) {
            collegeAll.checked = true;
          } else {
            specificCollegeChecks.forEach(cb => { cb.checked = colleges.includes(cb.value); });
          }
          updateCollegePillState();

          // Year levels
          const years = Array.isArray(data.target_years) ? data.target_years : [];
          if (years.includes('All')) {
            yearAll.checked = true;
          } else {
            specificYearChecks.forEach(cb => { cb.checked = years.includes(cb.value); });
          }
          updateYearPillState();

        } catch (err) {
          alert('Could not reach the server.');
          window.location.href = 'admin_dashboard.html';
        }
      }

      /* ── Submit ──────────────────────────────────────── */
      const form       = document.getElementById('edit-event-form');
      const publishBtn = form?.querySelector('.btn-publish');

      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const title    = document.getElementById('event-title').value.trim();
        const date     = document.getElementById('event-date').value;
        const startTime= document.getElementById('start-time').value;
        const endTime  = document.getElementById('end-time').value;
        const location = document.getElementById('event-location').value;
        const desc     = document.getElementById('event-description').value.trim();
        const category = document.getElementById('event-category').value;
        const capacity = document.getElementById('event-capacity').value;
        const colleges = getSelectedColleges();
        const years    = getSelectedYears();

        if (!title)    { showInlineError('❌ Please provide an event title.'); return; }
        if (!date)     { showInlineError('❌ Select a valid event date.'); return; }
        if (!startTime || !endTime) { showInlineError('❌ Fill in both start and end time.'); return; }
        if (!location) { showInlineError('❌ Choose a venue / location.'); return; }
        if (!desc)     { showInlineError('❌ Event description is required.'); return; }
        if (!category) { showInlineError('❌ Please select an event category.'); return; }
        if (!capacity || capacity < 1 || capacity > 300) { showInlineError('❌ Capacity must be between 1 and 300.'); return; }
        if (!colleges.length) { showInlineError('🎯 Select at least one target college (or "All Colleges").'); return; }
        if (!years.length)    { showInlineError('📆 Select at least one target year level (or "All Years").'); return; }

        clearInlineError();

        publishBtn.innerHTML = 'Saving…';
        publishBtn.style.opacity = '0.7';
        publishBtn.style.pointerEvents = 'none';

        try {
          const formData = new FormData();
          formData.append('title',           title);
          formData.append('date',            date);
          formData.append('start_time',      startTime);
          formData.append('end_time',        endTime);
          formData.append('location',        location);
          formData.append('description',     desc);
          formData.append('category',        category);
          formData.append('capacity',        String(parseInt(capacity, 10)));
          formData.append('target_colleges', JSON.stringify(colleges));
          formData.append('target_years',    JSON.stringify(years));

          const imageFile = document.getElementById('event-image').files[0];
          if (imageFile) formData.append('event_image', imageFile);

          const res  = await fetch(`/api/admin/events/${eventId}`, {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + adminToken },
            body: formData,
          });
          const data = await res.json();
          if (!res.ok) {
            showInlineError(data.error || 'Failed to save changes.');
            publishBtn.innerHTML = 'Save Changes →';
            publishBtn.style.opacity = '';
            publishBtn.style.pointerEvents = '';
            return;
          }
          alert('✅ Event updated successfully! Redirecting to dashboard…');
          window.location.href = 'admin_dashboard.html';
        } catch {
          showInlineError('Could not reach the server. Is it running?');
          publishBtn.innerHTML = 'Save Changes →';
          publishBtn.style.opacity = '';
          publishBtn.style.pointerEvents = '';
        }
      });

      loadEvent();
    })();
  </script>
</body>

</html>
