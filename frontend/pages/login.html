<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TUGON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../styles/login.css" />
</head>

<body>
  <nav class="navbar">
    <div class="nav-left">
      <img src="../assets/icons/icon.png" alt="Icon" class="nav-icon" />
    </div>
    <div class="nav-links-right">
      <span class="nav-login-text">Login</span>
    </div>
    <span id="admin-trigger" class="admin-dot" title="Admin Access"></span>
  </nav>

  <main class="page-content">
    <div class="login-page">

      <!-- Left Panel: System Logo -->
      <div class="login-visual page-fade">
        <div class="hero-glow"></div>
        <img src="../assets/icons/tugon_logo.png" alt="TUGON Logo" class="login-visual-logo" />
      </div>

      <!-- Right Panel: Login Form -->
      <div class="login-form-wrap">
        <div class="form-card page-fade">
          <h2>Welcome Back</h2>
          <p class="subtitle">Please enter your details to sign in.</p>

          <form id="login-form">
            <div class="form-group">
              <label for="login-email">Email Address</label>
              <input type="email" id="login-email" placeholder="Enter your email" required />
            </div>

            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" placeholder="••••••••" required />
            </div>

            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" id="remember-password" />
                <span>Remember password</span>
              </label>
            </div>

            <button type="submit" class="btn btn-primary">Log In →</button>
          </form>

          <div class="create-account">
            No account? <a href="signup.html">Create an account</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer
    style="background: var(--black); color: rgba(255,255,255,0.3); padding: 2rem; text-align: center; font-size: 0.8rem; border-top: 1px solid rgba(0,122,122,0.12);">
    &copy; 2026 TUGON School Event System
  </footer>

  <!-- Admin Portal Modal -->
  <div id="admin-modal" class="admin-modal-overlay">
    <div class="admin-modal-container">
      <div class="modal-header">
        <div class="modal-header-left">
          <img src="../assets/icons/icon.png" alt="Icon" class="modal-header-icon" />
          <span class="modal-header-title">Admin Portal</span>
        </div>
        <button id="close-admin-modal" class="close-modal">&times;</button>
      </div>

      <div class="modal-body">
        <h3>Administrator Login</h3>
        <p class="modal-subtitle">Restricted to authorized administrators only.</p>

        <form id="admin-login-form">
          <div class="form-group">
            <label for="admin-username">Username</label>
            <input type="text" id="admin-username" placeholder="Enter username" required />
          </div>

          <div class="form-group">
            <label for="admin-password">Password</label>
            <input type="password" id="admin-password" placeholder="••••••••" required />
          </div>

          <button type="submit" class="btn btn-primary btn-admin">Sign In as Admin →</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    /* ── Student Login ──────────────────────────────────── */
    const loginForm = document.getElementById('login-form');
    if (loginForm) {
      const submitBtn = loginForm.querySelector('button[type="submit"]');
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        submitBtn.textContent = 'Logging in…';
        submitBtn.disabled    = true;
        try {
          const res  = await fetch('/api/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (!res.ok) {
            alert(data.error || 'Login failed.');
            submitBtn.textContent = 'Log In →';
            submitBtn.disabled    = false;
            return;
          }
          localStorage.setItem('tugon_token',   data.token);
          localStorage.setItem('tugon_student',  JSON.stringify(data.student));
          window.location.href = 'home.html';
        } catch {
          alert('Could not reach the server. Please make sure it is running.');
          submitBtn.textContent = 'Log In →';
          submitBtn.disabled    = false;
        }
      });
    }

    /* ── Secret Admin Portal Trigger (5 clicks on dot) ─── */
    (function () {
      let clickCount = 0, clickTimer = null;
      const trigger  = document.getElementById('admin-trigger');
      const modal    = document.getElementById('admin-modal');
      const closeBtn = document.getElementById('close-admin-modal');

      if (trigger) {
        trigger.addEventListener('click', () => {
          clickCount++;
          clearTimeout(clickTimer);
          clickTimer = setTimeout(() => { clickCount = 0; }, 2000);
          if (clickCount === 5) {
            clickCount = 0;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
          }
        });
      }
      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          modal.classList.remove('show');
          document.body.style.overflow = '';
        });
      }

      /* ── Admin Login ────────────────────────────────── */
      const adminForm = document.getElementById('admin-login-form');
      if (adminForm) {
        const adminBtn = adminForm.querySelector('button[type="submit"]');
        adminForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const username = document.getElementById('admin-username').value.trim();
          const password = document.getElementById('admin-password').value;
          adminBtn.textContent = 'Signing in…';
          adminBtn.disabled    = true;
          try {
            const res  = await fetch('/api/admin/login', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password }),
            });
            const data = await res.json();
            if (!res.ok) {
              alert(data.error || 'Invalid administrator credentials.');
              adminBtn.textContent = 'Sign In as Admin →';
              adminBtn.disabled    = false;
              return;
            }
            localStorage.setItem('tugon_admin_token', data.token);
            localStorage.setItem('tugon_admin',       JSON.stringify(data.admin));
            window.location.href = 'admin_dashboard.html';
          } catch {
            alert('Could not reach the server.');
            adminBtn.textContent = 'Sign In as Admin →';
            adminBtn.disabled    = false;
          }
        });
      }
    })();
  </script>
</body>

</html>
