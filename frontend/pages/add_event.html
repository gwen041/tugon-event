<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create New Event — TUGON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../styles/admin_dashboard.css" />
  
  <style>
    /* Extra styles for multi-checkbox targeting (pill grid) — matches modern TUGON UI */
    .targeting-section {
      margin-top: 1.5rem;
      width: 100%;
      grid-column: 1 / -1;
    }

    .checkbox-grid-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .pill-checkbox {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(15, 25, 35, 0.9);
      backdrop-filter: blur(2px);
      padding: 0.55rem 1.2rem;
      border-radius: 60px;
      border: 1px solid rgba(45, 212, 191, 0.35);
      font-size: 0.85rem;
      font-weight: 500;
      color: #eef5ff;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .pill-checkbox:hover {
      background: rgba(0, 180, 180, 0.2);
      border-color: #2dd4bf;
    }

    .pill-checkbox input {
      margin: 0;
      width: 1rem;
      height: 1rem;
      accent-color: #2dd4bf;
      cursor: pointer;
    }

    .pill-checkbox.disabled {
      opacity: 0.55;
      filter: grayscale(0.1);
      pointer-events: none;
    }

    .featured-row {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      padding-top: 0.5rem;
      border-top: 1px solid rgba(45, 212, 191, 0.2);
    }

    .featured-check {
      background: rgba(0, 0, 0, 0.35);
      padding: 0.5rem 1rem;
      border-radius: 40px;
    }

    .check-pill-featured {
      background: rgba(45, 212, 191, 0.1);
    }

    .admin-form {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }

    .form-left,
    .form-right {
      flex: 1;
      min-width: 260px;
    }

    @media (max-width: 780px) {

      .form-left,
      .form-right {
        flex: 0 0 100%;
      }
    }
  </style>
</head>

<body>

  <!-- Mobile sidebar toggle (checkbox hack) -->
  <input type="checkbox" id="sidebar-toggle" class="sidebar-toggle">
  <label for="sidebar-toggle" class="sidebar-overlay"></label>
  <label for="sidebar-toggle" class="sidebar-hamburger" aria-label="Toggle Menu">
    <span></span><span></span><span></span>
  </label>

  <!-- Sidebar (original structure) -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/icons/icon.png" alt="Icon" />
      <span>TUGON</span>
    </div>

    <ul class="nav-menu">
      <li class="nav-item">
        <a href="admin_dashboard.html" class="nav-link">
          <span class="icon">📅</span>
          <span>Events</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="add_event.html" class="nav-link active">
          <span class="icon">➕</span>
          <span>Add Event</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="registrations.html" class="nav-link">
          <span class="icon">👥</span>
          <span>Registrations</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <a href="login.html" class="nav-link">
        <span>Logout</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="header-section">
      <div class="header-text">
        <h1>Create New Event</h1>
        <p>Fill in the details below to publish a new school event.</p>
      </div>

      <div class="user-profile">
        <span>Admin Portal</span>
        <div
          style="width: 32px; height: 32px; background: var(--teal-main); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem;">
          A</div>
      </div>
    </header>

    <div class="form-container">
      <form class="admin-form" id="create-event-form" novalidate>

        <!-- LEFT COLUMN: unchanged original fields (General & Schedule) -->
        <div class="form-left">
          <div class="form-section">
            <div class="section-header">
              <span class="icon">📝</span>
              <h2>General & Schedule</h2>
            </div>
            <div class="form-group">
              <label for="event-title">Event Title *</label>
              <input type="text" id="event-title" placeholder="e.g. Science Fair 2025" required />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="event-date">Date *</label>
                <input type="date" id="event-date" required />
              </div>
              <div class="form-group">
                <label>Time Range *</label>
                <div class="time-range">
                  <input type="time" id="start-time" required />
                  <span>to</span>
                  <input type="time" id="end-time" required />
                </div>
              </div>
            </div>
            <div class="form-group" style="margin-top: 0.5rem;">
              <label for="event-location">Venue / Location *</label>
              <select id="event-location" required>
                <option value="" disabled selected>Select where it will happen...</option>
                <option value="Auditorium">Auditorium</option>
                <option value="Gymnasium">Gymnasium</option>
                <option value="Facade">Facade</option>
                <option value="Multi-purpose Hall">Multi-purpose Hall</option>
                <option value="School Field">School Field</option>
              </select>
            </div>
            <div class="form-group" style="margin-top: 0.5rem;">
              <label for="event-image">Event Banner Image <span style="font-weight:400;opacity:0.7;">(optional, jpg/png/webp, max 5MB)</span></label>
              <input type="file" id="event-image" name="event_image" accept="image/jpeg,image/png,image/webp,image/gif"
                style="width:100%;padding:0.5rem 0.85rem;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:#0f1923;color:rgba(255,255,255,0.8);font-size:0.9rem;cursor:pointer;" />
            </div>
          </div>
        </div>

        <!-- RIGHT COLUMN: Description & Logistics (original layout) -->
        <div class="form-right">
          <div class="form-section" style="height: 100%; display: flex; flex-direction: column; min-height: 480px;">
            <div class="section-header">
              <span class="icon">⚙️</span>
              <h2>Description & Logistics</h2>
            </div>

            <div class="form-group" style="flex-grow: 1; display: flex; flex-direction: column; margin-bottom: 1.5rem;">
              <label for="event-description">Description *</label>
              <textarea id="event-description" placeholder="Describe the event goals and activities..." required
                style="flex-grow: 1; min-height: 120px;"></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem;">
              <div class="form-group">
                <label for="event-category">Category *</label>
                <select id="event-category" required>
                  <option value="" disabled selected>Select category...</option>
                  <option value="Academic">Academic</option>
                  <option value="Sports">Sports</option>
                  <option value="Cultural">Cultural</option>
                  <option value="Social">Social</option>
                  <option value="Others">Others</option>
                </select>
              </div>
              <div class="form-group">
                <label for="event-capacity">Capacity (Max 300) *</label>
                <input type="number" id="event-capacity" min="1" max="300" placeholder="Max 300" required />
              </div>
            </div>
          </div>
        </div>

        <!-- NEW FULL-WIDTH: TARGET AUDIENCE (multi-checkbox colleges + years) & Featured option -->
        <div class="targeting-section">
          <div class="form-section">
            <div class="section-header">
              <span class="icon">🎯</span>
              <h2>Target Audience</h2>
            </div>

            <!-- Target Colleges - multi-checkbox -->
            <div class="form-group">
              <label>Target Colleges * <span style="font-weight: 400; opacity:0.75;">(check all that apply)</span></label>
              <div class="checkbox-grid-pills" id="college-pill-group">
                <label class="pill-checkbox" id="college-all-label">
                  <input type="checkbox" name="target_colleges" value="All" class="college-check" id="college-all" />
                  <span>🏛️ All Colleges</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Arts and Science" class="college-check" />
                  <span>Arts and Science</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Business and Accountancy" class="college-check" />
                  <span>Business &amp; Accountancy</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Computer Studies" class="college-check" />
                  <span>Computer Studies</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Education" class="college-check" />
                  <span>Education</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Engineering" class="college-check" />
                  <span>Engineering</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Hospitality Management" class="college-check" />
                  <span>Hospitality Management</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_colleges" value="Nursing" class="college-check" />
                  <span>Nursing</span>
                </label>
              </div>
            </div>

            <!-- Target Year Levels - multi-checkbox -->
            <div class="form-group" style="margin-top: 1.8rem;">
              <label>Target Year Levels * <span style="font-weight: 400; opacity:0.75;">(check all that apply)</span></label>
              <div class="checkbox-grid-pills" id="year-pill-group">
                <label class="pill-checkbox" id="year-all-label">
                  <input type="checkbox" name="target_years" value="All" class="year-check" id="year-all" />
                  <span>🌟 All Years</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_years" value="1st Year" class="year-check" />
                  <span>1st Year</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_years" value="2nd Year" class="year-check" />
                  <span>2nd Year</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_years" value="3rd Year" class="year-check" />
                  <span>3rd Year</span>
                </label>
                <label class="pill-checkbox">
                  <input type="checkbox" name="target_years" value="4th Year" class="year-check" />
                  <span>4th Year</span>
                </label>
              </div>
            </div>
            </div>
          </div>

        <div class="btn-publish-container">
          <button type="submit" class="btn btn-dash btn-publish">Publish Event →</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    (function() {
      // ========== 1. MUTUAL EXCLUSION LOGIC: "All Colleges" / specific colleges ==========
      const collegeAll = document.getElementById('college-all');
      const allCollegeChecks = document.querySelectorAll('.college-check');
      const specificCollegeChecks = Array.from(allCollegeChecks).filter(cb => cb.value !== 'All');
      
      const yearAll = document.getElementById('year-all');
      const allYearChecks = document.querySelectorAll('.year-check');
      const specificYearChecks = Array.from(allYearChecks).filter(cb => cb.value !== 'All');

      // Helper: update visual disabled class for pills
      function updateCollegePillState() {
        if (collegeAll.checked) {
          specificCollegeChecks.forEach(cb => {
            cb.checked = false;
            const parentLabel = cb.closest('.pill-checkbox');
            if (parentLabel) parentLabel.classList.add('disabled');
          });
        } else {
          specificCollegeChecks.forEach(cb => {
            const parentLabel = cb.closest('.pill-checkbox');
            if (parentLabel) parentLabel.classList.remove('disabled');
          });
        }
      }

      function updateYearPillState() {
        if (yearAll.checked) {
          specificYearChecks.forEach(cb => {
            cb.checked = false;
            const parentLabel = cb.closest('.pill-checkbox');
            if (parentLabel) parentLabel.classList.add('disabled');
          });
        } else {
          specificYearChecks.forEach(cb => {
            const parentLabel = cb.closest('.pill-checkbox');
            if (parentLabel) parentLabel.classList.remove('disabled');
          });
        }
      }

      // College listeners
      if (collegeAll) {
        collegeAll.addEventListener('change', () => {
          if (collegeAll.checked) {
            specificCollegeChecks.forEach(cb => cb.checked = false);
          }
          updateCollegePillState();
        });
        specificCollegeChecks.forEach(cb => {
          cb.addEventListener('change', () => {
            if (cb.checked) {
              collegeAll.checked = false;
            }
            updateCollegePillState();
          });
        });
      }

      // Year listeners
      if (yearAll) {
        yearAll.addEventListener('change', () => {
          if (yearAll.checked) {
            specificYearChecks.forEach(cb => cb.checked = false);
          }
          updateYearPillState();
        });
        specificYearChecks.forEach(cb => {
          cb.addEventListener('change', () => {
            if (cb.checked) {
              yearAll.checked = false;
            }
            updateYearPillState();
          });
        });
      }

      // initial sync
      updateCollegePillState();
      updateYearPillState();

      // ========== 2. FORM SUBMIT HANDLER (keep original fields + new multi-checkbox targeting) ==========
      const form = document.getElementById('create-event-form');
      const publishBtn = form?.querySelector('.btn-publish');

      function getSelectedColleges() {
        const checked = Array.from(allCollegeChecks).filter(cb => cb.checked).map(cb => cb.value);
        if (checked.includes('All')) return ['All'];
        return checked;
      }

      function getSelectedYears() {
        const checked = Array.from(allYearChecks).filter(cb => cb.checked).map(cb => cb.value);
        if (checked.includes('All')) return ['All'];
        return checked;
      }

      function showInlineError(message) {
        // remove any existing temporary message
        let errDiv = document.getElementById('dynamic-form-error');
        if (!errDiv) {
          errDiv = document.createElement('div');
          errDiv.id = 'dynamic-form-error';
          errDiv.style.margin = '0 0 1rem 0';
          errDiv.style.padding = '0.8rem 1.2rem';
          errDiv.style.borderRadius = '12px';
          errDiv.style.backgroundColor = 'rgba(220, 38, 38, 0.15)';
          errDiv.style.border = '1px solid rgba(239, 68, 68, 0.4)';
          errDiv.style.color = '#fca5a5';
          errDiv.style.fontWeight = '500';
          const formContainer = document.querySelector('.admin-form');
          if (formContainer && formContainer.firstChild) {
            formContainer.insertBefore(errDiv, formContainer.firstChild);
          } else if (formContainer) {
            formContainer.prepend(errDiv);
          }
        }
        errDiv.textContent = message;
        errDiv.style.display = 'block';
        setTimeout(() => errDiv.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
      }

      function clearInlineError() {
        const errDiv = document.getElementById('dynamic-form-error');
        if (errDiv) errDiv.style.display = 'none';
      }

      function validateAllFields() {
        const title = document.getElementById('event-title').value.trim();
        const date = document.getElementById('event-date').value;
        const startTime = document.getElementById('start-time').value;
        const endTime = document.getElementById('end-time').value;
        const location = document.getElementById('event-location').value;
        const description = document.getElementById('event-description').value.trim();
        const category = document.getElementById('event-category').value;
        const capacity = document.getElementById('event-capacity').value;
        
        if (!title) { showInlineError('❌ Please provide an event title.'); return false; }
        if (!date) { showInlineError('❌ Select a valid event date.'); return false; }
        if (!startTime || !endTime) { showInlineError('❌ Fill in both start and end time.'); return false; }
        if (!location) { showInlineError('❌ Choose a venue / location.'); return false; }
        if (!description) { showInlineError('❌ Event description is required.'); return false; }
        if (!category) { showInlineError('❌ Please select an event category.'); return false; }
        if (!capacity || capacity < 1 || capacity > 300) { showInlineError('❌ Capacity must be between 1 and 300.'); return false; }
        
        const colleges = getSelectedColleges();
        const years = getSelectedYears();
        if (colleges.length === 0) { showInlineError('🎯 Select at least one target college (or "All Colleges").'); return false; }
        if (years.length === 0) { showInlineError('📆 Select at least one target year level (or "All Years").'); return false; }
        
        clearInlineError();
        return true;
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        if (!validateAllFields()) return;
        
        // gather final event data
        const colleges = getSelectedColleges();
        const years = getSelectedYears();
        const eventPayload = {
          title: document.getElementById('event-title').value.trim(),
          date: document.getElementById('event-date').value,
          start_time: document.getElementById('start-time').value,
          end_time: document.getElementById('end-time').value,
          location: document.getElementById('event-location').value,
          description: document.getElementById('event-description').value.trim(),
          category: document.getElementById('event-category').value,
          capacity: parseInt(document.getElementById('event-capacity').value, 10),
          target_colleges: colleges,
          target_years: years,
        };
        
        /* ── Real API call ─────────────────────────────── */
        const adminToken = localStorage.getItem('tugon_admin_token');
        if (!adminToken) { window.location.href = 'login.html'; return; }

        if (publishBtn) {
          publishBtn.innerHTML = 'Publishing…';
          publishBtn.style.opacity = '0.7';
          publishBtn.style.pointerEvents = 'none';
        }

        try {
          /* Use FormData so we can optionally include an image file */
          const formData = new FormData();
          formData.append('title',           document.getElementById('event-title').value.trim());
          formData.append('date',            document.getElementById('event-date').value);
          formData.append('start_time',      document.getElementById('start-time').value);
          formData.append('end_time',        document.getElementById('end-time').value);
          formData.append('location',        document.getElementById('event-location').value);
          formData.append('description',     document.getElementById('event-description').value.trim());
          formData.append('category',        document.getElementById('event-category').value);
          formData.append('capacity',        document.getElementById('event-capacity').value);
          formData.append('target_colleges', JSON.stringify(colleges));
          formData.append('target_years',    JSON.stringify(years));

          const imageFile = document.getElementById('event-image').files[0];
          if (imageFile) formData.append('event_image', imageFile);

          const res  = await fetch('/api/admin/events', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + adminToken },
            /* NOTE: do NOT set Content-Type here; browser sets multipart boundary */
            body: formData,
          });
          const data = await res.json();
          if (!res.ok) {
            showInlineError(data.error || 'Failed to publish event.');
            publishBtn.innerHTML = 'Publish Event →';
            publishBtn.style.opacity = '';
            publishBtn.style.pointerEvents = '';
            return;
          }
          alert('✅ Event published successfully! Redirecting to dashboard…');
          window.location.href = 'admin_dashboard.html';
        } catch {
          showInlineError('Could not reach the server. Is it running?');
          publishBtn.innerHTML = 'Publish Event →';
          publishBtn.style.opacity = '';
          publishBtn.style.pointerEvents = '';
        }
      });
      
      // optional: attach to any dynamic recheck
    })();
  </script>
</body>

</html>
